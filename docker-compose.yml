version: '3.8'

services:
  app:
    image: ${GHCR_IMAGE:-ghcr.io/ginganomercy/qc-monitoring-sys:latest}
    restart: unless-stopped
    volumes:
      - qc_app_code:/var/www/html
      - ./.env:/var/www/html/.env
    env_file:
      - .env
    networks:
      - qc-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: ${GHCR_IMAGE_NGINX:-ghcr.io/ginganomercy/qc-monitoring-sys-nginx:latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8088:80"
    volumes:
      - qc_app_code:/var/www/html:ro
    networks:
      - qc-network
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-qc_monitoring}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-qc_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - qc-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - qc-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  cron:
    image: ${GHCR_IMAGE:-ghcr.io/ginganomercy/qc-monitoring-sys:latest}
    restart: unless-stopped
    command: >
      sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"
    volumes:
      - qc_app_code:/var/www/html
      - ./.env:/var/www/html/.env
    env_file:
      - .env
    networks:
      - qc-network
    depends_on:
      - mysql
      - redis

networks:
  qc-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  qc_app_code:
    driver: local
