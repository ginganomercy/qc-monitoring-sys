name: QC Monitoring CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    name: Code Quality & Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite3, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick
          coverage: none

      - name: Copy .env
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: Install Composer Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Run Linter (Laravel Pint)
        run: ./vendor/bin/pint --test

      - name: Create Database for Testing
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: Run Tests (PHPUnit)
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan test

  deploy:
    name: Build & Deploy to Baremetal
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 1. Masuk ke direktori aplikasi
            cd /var/www/qc-monitoring-system
            
            # 2. Pull perubahan terbaru dari main branch
            git pull origin main
            
            # 3. Clean up container lama (opsional untuk menghindari caching)
            # docker compose down
            
            # 4. Build image dengan data terbaru (composer install jalan di sini)
            docker compose build
            
            # 5. Jalankan kembali container tanpa downtime (detached)
            docker compose up -d
            
            # 6. Bersihkan dangling images agar disk server tidak penuh
            docker image prune -f
