name: QC Monitoring CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint-and-test:
    name: Code Quality & Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite3, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick
          coverage: none

      - name: Copy .env
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: Install Composer Dependencies
        run: composer update -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Run Linter (Laravel Pint)
        run: ./vendor/bin/pint --test

      - name: Create Database for Testing
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: Run Tests (PHPUnit)
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan test

  build-and-push:
    name: Build Docker Image & Push to GHCR
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push PHP App image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/php/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Build and push Nginx image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/nginx/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}-nginx:latest
            ghcr.io/${{ env.IMAGE_NAME }}-nginx:${{ github.sha }}

  deploy:
    name: Deploy via Tailscale
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Copy docker-compose.yml via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Masuk ke direktori aplikasi
            cd ${{ secrets.DEPLOY_PATH }}
            
            # 2. Login ke GHCR agar bisa melakukan pull private/public image
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # 3. Pull image terbaru dari GHCR
            export GHCR_IMAGE=ghcr.io/${{ env.IMAGE_NAME }}:latest
            export GHCR_IMAGE_NGINX=ghcr.io/${{ env.IMAGE_NAME }}-nginx:latest
            docker compose pull
            
            # 4. Jalankan kembali container tanpa downtime (detached)
            docker compose up -d
            
            # 5. Jalankan Migrasi Database Otomatis
            docker compose exec -T app php artisan migrate --force
            
            # 6. Optimasi Caching & Konfigurasi
            docker compose exec -T app php artisan optimize:clear
            docker compose exec -T app php artisan optimize
            
            # 7. Bersihkan dangling images agar disk server tidak penuh
            docker image prune -f
